spring.application.name=finalproject

# ===============================
# DATABASE
# ===============================
# FIXED: use 'db' (docker service name), not 'localhost'
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===============================
# JPA / HIBERNATE
# ===============================
# FIXED: removed duplicate, use update only
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# FIXED: was MySQL8Dialect, must be PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:Zm9ydHktdHdvLWlzLXRoZS1hbnN3ZXItdG8tbGlmZS10aGUtdW5pdmVyc2UtYW5kLWV2ZXJ5dGhpbmc=}
jwt.expiration=86400000
jwt.cookie.domain=localhost

# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.messaging=INFO
logging.level.org.flywaydb=INFO